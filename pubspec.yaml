name: youthscores
description: Youth Scores - Egyptian youth football tournament tracker.
publish_to: 'none'
version: 12.0.0+19

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  http: ^1.2.2
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  path_provider: ^2.1.5
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  share_plus: ^13.2.0
  intl: ^0.20.2
  shimmer: ^3.0.0
  connectivity_plus: ^7.2.0
  package_info_plus: ^10.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
